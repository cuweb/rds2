name: Publish Package to NPM

on:
  push:
    tags:
      - '*'

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      # Each registry line reads ${NODE_AUTH_TOKEN} at request time, so the
      # install step (NODE_AUTH_TOKEN = GITHUB_TOKEN) authenticates to GitHub
      # Packages, and the publish step (NODE_AUTH_TOKEN = NPM_TOKEN) authenticates
      # to npmjs.org. The unused registry per step is harmless.
      - name: Configure registry auth
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm build
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test --run

      - run: pnpm publish --access public --provenance --no-git-checks
        env:
            NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
